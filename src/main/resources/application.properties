# Application
spring.application.name=lost-found-backend
server.port=${PORT:8080}

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lostfounddb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:change-this-in-production}
jwt.expiration=86400000

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.com.campus.lostfound=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000,https://lost-found-frontend-tawny.vercel.app,https://*.vercel.app}

# ===============================
# Multipart Upload
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# ===============================
# Static resources
# ===============================
spring.web.resources.static-locations=classpath:/static/,file:${user.dir}/uploads/